name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "invcc-graphs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Evita despliegues simultáneos; deja terminar el que está en curso.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preparar sitio
        run: |
          mkdir -p _site
          cp -r invcc-graphs/. _site/
          # GitHub Pages sirve index.html por defecto.
          cp invcc-graphs/dashboard.html _site/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Desplegar
        id: deployment
        uses: actions/deploy-pages@v4
